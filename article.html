<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قسم — أكاديمية الشبكات</title>
<link rel="stylesheet" href="style.css">
<style>
  .dynamic-page-empty {
    text-align: center;
    padding: 5rem 1.5rem;
    color: var(--text-muted);
  }
  .dynamic-page-empty .empty-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }
  .dynamic-page-loading {
    text-align: center;
    padding: 5rem 1.5rem;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<header class="page-hero">
  <div class="breadcrumb anim-1">
    <a href="index.html">الرئيسية</a><span class="sep">›</span>
    <span id="pageBreadcrumb">قسم مخصّص</span>
  </div>
  <div class="page-hero-tag anim-1" id="pageTag">📄 قسم</div>
  <h1 class="anim-2" id="pageTitle">جارٍ التحميل...</h1>
  <p class="anim-3" id="pageSubtitle">—</p>
</header>

<main class="page-content">
  <div id="pageLoading" class="dynamic-page-loading">
    <div style="font-size:2rem;">⏳</div>
    <p style="margin-top:1rem;">جارٍ تحميل المحتوى...</p>
  </div>

  <div id="pageEmpty" class="dynamic-page-empty" style="display:none;">
    <div class="empty-icon">📭</div>
    <h2>لا يوجد محتوى بعد</h2>
    <p>لم يتم نشر أي مقال في هذا القسم حتى الآن.</p>
    <p><a href="index.html" style="color:var(--accent);">→ العودة للرئيسية</a></p>
  </div>
</main>

<footer>
  <p>إعداد: <strong>الكلية التقنية بالمندق</strong> | المدرب: <strong>منصور الزهراني</strong></p>
  <div class="footer-links">
    <a href="index.html">الرئيسية</a>
    <a href="networks.html">شبكات الحاسب</a>
    <a href="security.html">الأمان</a>
    <a href="osi.html">نموذج OSI</a>
    <a href="cables.html">الكيابل</a>
    <a href="ip.html">بروتوكول IP</a>
  </div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCz9Wedr_X3VzoaH0gJj8QFrNIK5vT4vww",
  authDomain:        "networkacademy-795c8.firebaseapp.com",
  projectId:         "networkacademy-795c8",
  storageBucket:     "networkacademy-795c8.firebasestorage.app",
  messagingSenderId: "458132238000",
  appId:             "1:458132238000:web:bffd7321407b094bb21575",
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// استخراج معرّف القسم من URL
const params = new URLSearchParams(window.location.search);
const sectionId = params.get('id');

async function loadSection() {
  const loadingEl = document.getElementById('pageLoading');
  const emptyEl   = document.getElementById('pageEmpty');
  const mainEl    = document.querySelector('main.page-content');

  if (!sectionId) {
    loadingEl.style.display = 'none';
    emptyEl.style.display = 'block';
    document.getElementById('pageTitle').textContent = 'لم يُحدَّد قسم';
    return;
  }

  try {
    // جلب بيانات القسم
    const sectionSnap = await getDoc(doc(db, "sections", sectionId));
    let sectionData = null;
    if (sectionSnap.exists()) sectionData = sectionSnap.data();

    // تحديث رأس الصفحة
    if (sectionData) {
      document.title = `${sectionData.title} — أكاديمية الشبكات`;
      document.getElementById('pageTitle').textContent = sectionData.title;
      document.getElementById('pageSubtitle').textContent = sectionData.description || '';
      document.getElementById('pageBreadcrumb').textContent = sectionData.title;
      document.getElementById('pageTag').textContent = `${sectionData.icon || '📄'} ${sectionData.title}`;
    } else {
      document.getElementById('pageTitle').textContent = sectionId;
      document.getElementById('pageBreadcrumb').textContent = sectionId;
    }

    // جلب المقالات
    const snap = await getDocs(query(
      collection(db, "articles"),
      where("pageId", "==", sectionId)
    ));

    loadingEl.style.display = 'none';

    if (snap.empty) {
      emptyEl.style.display = 'block';
      return;
    }

    const articles = [];
    snap.forEach(d => articles.push({ id: d.id, ...d.data() }));
    articles.sort((a, b) => {
      const ta = a.createdAt?.toDate?.()?.getTime() ?? 0;
      const tb = b.createdAt?.toDate?.()?.getTime() ?? 0;
      return tb - ta;
    });

    // عرض المقالات (نستخدم نفس تنسيق articles-loader.js)
    const section = document.createElement('section');
    section.className = 'dynamic-articles-section';
    section.innerHTML = `
      <style>
        .dynamic-articles-section {
          margin: 1rem 0 2rem;
          padding: 1.5rem;
          background: var(--card2, #13162a);
          border: 1px solid var(--border, rgba(108,47,160,0.22));
          border-radius: var(--radius, 14px);
        }
        .dyn-art-card {
          background: rgba(255,255,255,0.03);
          border: 1px solid var(--border, rgba(108,47,160,0.22));
          border-radius: 12px;
          padding: 1.75rem;
          margin-bottom: 1.5rem;
          transition: border-color 0.22s, transform 0.22s;
        }
        .dyn-art-card:hover {
          border-color: rgba(0,201,177,0.5);
          transform: translateY(-2px);
        }
        .dyn-art-title {
          font-size: 1.3rem;
          font-weight: 900;
          color: var(--accent, #00c9b1);
          margin: 0 0 0.5rem;
        }
        .dyn-art-date {
          font-size: 0.78rem;
          color: var(--text-faint, #5a5f7a);
          margin-bottom: 1.25rem;
        }
        .dyn-art-body {
          color: var(--text, #e8eaf6);
          line-height: 1.9;
          font-size: 0.95rem;
        }
        .dyn-art-body p { margin: 0.8rem 0; }
        .dyn-art-body ul, .dyn-art-body ol { margin: 0.8rem 2rem; }
        .dyn-art-body h1, .dyn-art-body h2, .dyn-art-body h3, .dyn-art-body h4 {
          color: var(--accent, #00c9b1);
          margin: 1.4rem 0 0.7rem;
          font-weight: 800;
        }
        .dyn-art-body img { max-width: 100%; border-radius: 8px; margin: 0.75rem 0; }
        .dyn-art-body table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .dyn-art-body table td, .dyn-art-body table th { border: 1px solid rgba(108,47,160,0.3); padding: 8px 12px; }
        .dyn-art-body table th { background: rgba(108,47,160,0.2); font-weight: 700; }
        .dyn-art-body a { color: #00c9b1; text-decoration: underline; }
        .dyn-art-body blockquote {
          border-right: 4px solid #8b46c8;
          padding: 0.5rem 1rem;
          margin: 0.75rem 0;
          background: rgba(108,47,160,0.08);
          color: var(--text-muted, #7a7f9e);
        }
      </style>
    `;
    mainEl.appendChild(section);

    articles.forEach(art => {
      const card = document.createElement('article');
      card.className = 'dyn-art-card';
      let dateStr = '';
      if (art.createdAt?.toDate) {
        const dt = art.createdAt.toDate();
        dateStr = dt.toLocaleDateString('ar-SA', { year:'numeric', month:'long', day:'numeric' });
      }
      card.innerHTML = `
        <h3 class="dyn-art-title">${escape(art.title || 'بدون عنوان')}</h3>
        ${dateStr ? `<div class="dyn-art-date">📅 ${dateStr}</div>` : ''}
        <div class="dyn-art-body">${art.content || ''}</div>
      `;
      section.appendChild(card);
    });

  } catch (err) {
    console.error('section load error:', err);
    loadingEl.style.display = 'none';
    emptyEl.style.display = 'block';
    emptyEl.querySelector('h2').textContent = '❌ خطأ في التحميل';
    emptyEl.querySelector('p').textContent = err.message;
  }
}

function escape(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadSection();
</script>

<script src="shared-nav.js"></script>
</body>
</html>
