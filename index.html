<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكات الحاسب الآلي | منصور مستور الزهراني</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { primary: '#ffffff', secondary: '#2563eb', accent: '#0ea5e9' }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            /* إعدادات الخلفية الشاملة */
            .site-bg { 
                background-image: url('bakground.jpg'); 
                background-size: cover; 
                background-position: center; 
                background-attachment: fixed; 
                background-color: #f8fafc; /* لون احتياطي */
            }
            
            /* البطاقات الزجاجية الموحدة */
            .glass-card { @apply bg-white/90 backdrop-blur-md border border-slate-200/80 shadow-lg rounded-[2rem] overflow-hidden; }
            .hover-scale { @apply transition-all duration-300 hover:-translate-y-1.5 hover:shadow-2xl hover:border-blue-300 hover:bg-white; }
            
            /* تصميم القائمة الجانبية (Sidebar) */
            /* جعلها أغمق قليلاً من باقي الموقع كما طلبت */
            .sidebar-bg { @apply bg-slate-100/95 backdrop-blur-xl border-l border-slate-300 shadow-[4px_0_20px_rgba(0,0,0,0.08)]; }
            .sidebar-item { @apply flex items-center gap-3 px-5 py-3.5 w-full text-right font-black text-slate-600 rounded-xl transition cursor-pointer border-r-4 border-transparent hover:bg-white hover:text-blue-600 shadow-sm; }
            .sidebar-item.active { @apply bg-blue-600 text-white border-blue-800 shadow-md; }
            .sidebar-item.active i { @apply text-white; }
            .sub-tab { @apply block w-full text-right px-10 py-2.5 text-sm font-bold text-slate-500 hover:text-blue-600 transition cursor-pointer hover:bg-white/50 rounded-lg; }
            .sub-tab.active { @apply text-blue-700 border-r-4 border-blue-500 bg-blue-50/80; }
            
            .btn-primary { @apply w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition shadow-lg shadow-blue-600/30; }
            
            /* تنسيقات محرر النصوص (Rich Text Editor) والمحتوى المعروض لتوحيد التصميم */
            .editor-toolbar { @apply bg-slate-100/90 backdrop-blur p-3 rounded-t-2xl flex flex-wrap gap-2 items-center border border-slate-300 border-b-0 shadow-inner; }
            .editor-toolbar button, .editor-toolbar select { @apply bg-white hover:bg-blue-50 text-slate-700 px-3 py-1.5 rounded-lg cursor-pointer transition text-sm font-bold border border-slate-200 outline-none shadow-sm flex items-center gap-1; }
            .editor-toolbar input[type="color"] { @apply bg-white border border-slate-200 cursor-pointer w-8 h-8 p-0.5 rounded-lg shadow-sm; }
            
            .rich-editor, .rich-display { @apply w-full p-8 bg-white/95 backdrop-blur border border-slate-300 rounded-b-2xl text-slate-700 outline-none overflow-y-auto leading-loose text-lg font-medium shadow-sm; }
            
            /* التنسيقات الداخلية للمحتوى (لكي يتطابق مع الصور التي أرفقتها) */
            .rich-editor h1, .rich-display h1 { @apply text-4xl font-black mb-6 text-blue-800 mt-4 border-b-2 border-slate-100 pb-2; }
            .rich-editor h2, .rich-display h2 { @apply text-3xl font-black mb-4 text-blue-700 mt-4; }
            .rich-editor h3, .rich-display h3 { @apply text-2xl font-black mb-3 text-indigo-600 mt-3; }
            .rich-editor p, .rich-display p { @apply mb-4 text-justify; }
            .rich-editor ul, .rich-display ul { @apply list-disc list-inside mb-6 mr-4 text-slate-700 space-y-2 font-bold; }
            
            /* تصميم الجداول والمربعات (مطابق للصورة) */
            .rich-editor table, .rich-display table { @apply w-full text-center border-collapse bg-white mb-8 rounded-2xl overflow-hidden shadow-sm border border-slate-200; }
            .rich-editor th, .rich-display th { @apply bg-slate-50 p-4 border-b border-slate-200 font-black text-purple-800 text-lg; }
            .rich-editor td, .rich-display td { @apply p-4 border-b border-slate-100 font-bold text-slate-600; }
            .rich-editor img, .rich-display img { @apply max-w-full h-auto rounded-xl shadow-md my-4 object-cover inline-block; }
            
            /* تنسيق الكروت الشبكية المخصصة */
            .custom-grid-container { @apply grid grid-cols-1 md:grid-cols-3 gap-6 my-8 text-center; }
            .custom-grid-card { @apply bg-white border border-slate-200 p-6 rounded-[2rem] shadow-sm transition hover:-translate-y-1 hover:shadow-md; }
            .custom-grid-icon { @apply text-5xl mb-4 block mx-auto; }
            .custom-grid-title { @apply text-xl font-black mb-2; }
            .custom-grid-desc { @apply text-sm font-bold text-slate-500 leading-relaxed; }
        }
        .page-enter { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .toast { @apply fixed bottom-5 left-5 z-[9999] opacity-0 translate-y-10 transition-all duration-300 bg-white border border-slate-200 px-6 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-2xl text-slate-800; }
        .toast.show { @apply opacity-100 translate-y-0; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.5); }
    </style>
</head>
<body class="text-slate-800 font-sans selection:bg-blue-200 selection:text-blue-900 flex h-screen site-bg overflow-hidden">

    <!-- القائمة الجانبية (Sidebar) الثابتة على اليمين (لون أغمق قليلاً) -->
    <aside id="main-sidebar" class="w-[300px] sidebar-bg z-50 flex-col hidden lg:flex h-full flex-shrink-0">
        <div class="p-6 border-b border-slate-200/60 flex items-center gap-4 cursor-pointer hover:bg-white/50 transition" onclick="goHome()">
            <div class="bg-blue-600 p-3 rounded-2xl shadow-md"><i class="fas fa-network-wired text-white text-xl"></i></div>
            <h1 class="font-black text-slate-800 text-2xl tracking-tight">أكاديمية الشبكات</h1>
        </div>

        <div class="p-6 border-t border-slate-200/60 bg-slate-200/30 text-center">

            <p class="text-blue-700 font-black">منصور مستور الزهراني</p>
        </div>
    </aside>

    <!-- المساحة الرئيسية للعمل -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative bg-white/40 backdrop-blur-sm">
        
        <!-- الشريط العلوي للتنقل في الجوال -->
        <nav class="lg:hidden bg-white/90 backdrop-blur-md p-4 sticky top-0 z-40 border-b border-slate-200 shadow-sm flex justify-between items-center">
            <button onclick="document.getElementById('main-sidebar').classList.toggle('hidden')" class="text-slate-600 text-2xl p-2"><i class="fas fa-bars"></i></button>
            <div class="font-black text-blue-800 text-xl flex items-center gap-2 cursor-pointer" onclick="goHome()"><i class="fas fa-network-wired text-blue-600"></i> أكاديمية الشبكات</div>
            <button onclick="toggleFS()" class="text-slate-600 text-xl p-2"><i class="fas fa-expand" id="fs-icon"></i></button>
        </nav>

        <!-- منطقة التمرير للمحتوى -->
        <main id="main-scroll-area" class="flex-1 overflow-y-auto p-4 md:p-10 custom-scrollbar">
            
            <!-- الواجهة الرئيسية -->
            <div id="portal-dashboard" class="block page-enter max-w-7xl mx-auto">
                <header class="bg-white/95 backdrop-blur rounded-[3rem] p-10 md:p-20 text-center border border-slate-200 shadow-xl mb-12 relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-b from-blue-50 to-transparent opacity-70"></div>
                    <div class="relative z-10">
                        <span class="bg-blue-100 text-blue-700 py-2.5 px-8 rounded-full text-sm font-black mb-8 inline-block shadow-sm border border-blue-200">المؤسسة العامة للتدريب التقني والمهني</span>
                        <h1 class="text-5xl md:text-7xl font-black mb-6 text-slate-800 tracking-tight drop-shadow-sm">شبكات <span class="text-blue-600">الحاسب الآلي</span></h1>
                        <p class="text-lg md:text-2xl text-slate-600 max-w-3xl mx-auto font-bold leading-relaxed">المرجع الأكاديمي الشامل لمهندسي الشبكات، يغطي المبادئ، الأمان، بروتوكولات التوجيه، والمعايير الفيزيائية.</p>
                    </div>
                </header>
                
                <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- سيتم تعبئة البطاقات هنا برمجياً -->
                </div>
            </div>

            <!-- حاوية الأقسام التعليمية الديناميكية (تعرض الـ PDF أو تعديلات الـ CMS) -->
            <div id="section-container" class="hidden page-enter max-w-6xl mx-auto pb-20">
                <header class="bg-white/95 backdrop-blur p-10 rounded-[3rem] shadow-sm border border-slate-200 mb-8 text-center">
                    <h1 id="section-title" class="text-4xl md:text-5xl font-black text-blue-800 tracking-tight">العنوان</h1>
                </header>

                <!-- للتبويبات العلوية في الجوال فقط -->
                <div id="mobile-tabs" class="lg:hidden flex gap-2 overflow-x-auto custom-scrollbar mb-8 pb-2"></div>
                
                <div id="content-area" class="w-full page-enter">
                    <!-- المحتوى سيحقن هنا -->
                </div>
            </div>

            <!-- قسم الاختبارات (LMS Views) -->
            <div id="section-exams" class="hidden page-enter max-w-6xl mx-auto pb-20">
                <header class="bg-white/95 backdrop-blur p-10 rounded-[3rem] shadow-sm border border-slate-200 mb-8 text-center">
                    <h1 class="text-4xl md:text-5xl font-black text-yellow-600 tracking-tight">قسم الاختبارات والتقييمات</h1>
                </header>
                <div id="lms-area"></div>
            </div>

        </main>
    </div>

    <div id="tst" class="toast"><i id="tsti" class="fas"></i><span id="tstt"></span></div>

    <!-- بيانات المحتوى الأساسية (مفرغة 100% من ملفات الـ PDF مع تنسيق موحد CSS) -->
    <script>
        const CORE_DATA = {
            'networks': {
                title: 'مبادئ شبكات الحاسب', icon: 'fa-globe', color: 'blue', desc: 'مفهوم الشبكة، المكونات، الفوائد، والتصاميم الهندسية بالكامل.',
                tabs: ['مفهوم الشبكة والفوائد', 'المكونات والوسائط', 'التصاميم الجغرافية والمعمارية'],
                content: [
                    `<div class="rich-display glass-card p-10">
                        <h1><i class="fas fa-info-circle ml-2"></i> ماهي شبكة الحاسب؟</h1>
                        <p>شبكة الحاسب (Computer Network) عبارة عن مجموعة من الحاسبات والأجهزة الأخرى المتصلة مع بعضها البعض حيث يكون لها القدرة على مشاركة عدد كبير من المستخدمين للبيانات (Data) والأجهزة (Hardware) كما تعتبر الشبكة وسيلة اتصال الكتروني بين الأفراد.</p>
                        
                        <h2 class="text-center mt-10 mb-6">فوائد شبكات الحاسب</h2>
                        <div class="custom-grid-container">
                            <div class="custom-grid-card border-t-4 border-t-blue-500">
                                <i class="fas fa-database custom-grid-icon text-blue-500"></i>
                                <div class="custom-grid-title">مشاركة البيانات</div>
                                <p class="custom-grid-desc">نقل المعلومات والملفات بسرعة فائقة بين المستخدمين دون وسائط تخزين خارجية.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-emerald-500">
                                <i class="fas fa-print custom-grid-icon text-emerald-500"></i>
                                <div class="custom-grid-title">مشاركة الموارد</div>
                                <p class="custom-grid-desc">تتيح للجميع استخدام أجهزة صلبة (Hardware) مثل الطابعات والماسحات الضوئية.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-purple-500">
                                <i class="fas fa-laptop-code custom-grid-icon text-purple-500"></i>
                                <div class="custom-grid-title">مشاركة البرمجيات</div>
                                <p class="custom-grid-desc">العمل على برامج موحدة (Software) بتثبيت نسخة واحدة على الخادم للجميع.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-orange-500 md:col-span-1 lg:col-span-1">
                                <i class="fas fa-folder-open custom-grid-icon text-orange-500"></i>
                                <div class="custom-grid-title">مشاركة الملفات مباشرة</div>
                                <p class="custom-grid-desc">نقل مباشر بين الأجهزة بدلاً من إرسالها عبر البريد الإلكتروني.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-red-500 md:col-span-2 lg:col-span-2 bg-red-50/30">
                                <i class="fas fa-gamepad custom-grid-icon text-red-500"></i>
                                <div class="custom-grid-title">ألعاب الكمبيوتر الجماعية</div>
                                <p class="custom-grid-desc">التفاعل بين أكثر من مستخدم (Multiplayer) للعب في نفس البيئة الافتراضية.</p>
                            </div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card p-10">
                        <h1 class="text-center mb-8">مكونات شبكة الحاسب</h1>
                        <div class="custom-grid-container">
                            <div class="custom-grid-card bg-blue-50/50">
                                <i class="fas fa-desktop custom-grid-icon text-blue-600"></i>
                                <div class="custom-grid-title text-blue-800">الأجهزة الطرفية</div>
                                <div class="text-blue-500 font-bold mb-4 uppercase text-xs tracking-widest">End Devices</div>
                                <p class="custom-grid-desc text-justify">الجهاز الطرفي: هو المكان الذي تنشأ منه الرسالة أو المكان الذي يتم استلامها فيه. تنشأ البيانات باستخدام جهاز طرفي وتتدفق خلال الشبكة وتصل إلى جهاز طرفي آخر. (مثل أجهزة الكمبيوتر، الطابعات الشبكية، الكاميرات، الجوالات).</p>
                            </div>
                            <div class="custom-grid-card bg-indigo-50/50">
                                <div class="flex justify-center gap-4 mb-4 h-12">
                                    <i class="fas fa-random text-5xl text-indigo-600"></i>
                                    <i class="fas fa-route text-5xl text-indigo-600"></i>
                                </div>
                                <div class="custom-grid-title text-indigo-800">الأجهزة الوسيطة</div>
                                <div class="text-indigo-500 font-bold mb-4 uppercase text-xs tracking-widest">Intermediary</div>
                                <p class="custom-grid-desc text-justify">تقوم بالاتصال البيني بين الأجهزة الطرفية وتوجيه الحزم واختيار المسار وحماية الشبكة. من الأمثلة عليها: أجهزة التبديل (Switch)، أجهزة التوجيه (Router)، نقاط الوصول اللاسلكية (Access Point)، وجدران الحماية (Firewalls).</p>
                            </div>
                            <div class="custom-grid-card bg-emerald-50/50">
                                <i class="fas fa-wifi custom-grid-icon text-emerald-600"></i>
                                <div class="custom-grid-title text-emerald-800">وسائط الشبكة</div>
                                <div class="text-emerald-500 font-bold mb-4 uppercase text-xs tracking-widest">Media</div>
                                <p class="custom-grid-desc text-justify">يتم نقل الاتصالات عبر الشبكة من خلال وسيط يسمح للرسالة بالانتقال من المصدر إلى الوجهة. وتشمل: الكابلات النحاسية، كابلات الألياف الضوئية، والموجات اللاسلكية.</p>
                            </div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card p-10">
                        <h2>الشبكات من حيث المدى الجغرافي</h2>
                        <div class="custom-grid-container" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                            <div class="custom-grid-card">
                                <i class="fab fa-bluetooth custom-grid-icon text-blue-500"></i>
                                <div class="custom-grid-title">PAN</div>
                                <p class="custom-grid-desc">الشبكة الشخصية لتوصيل الأجهزة في نطاق أمتار كالبلوتوث.</p>
                            </div>
                            <div class="custom-grid-card">
                                <i class="fas fa-building custom-grid-icon text-emerald-500"></i>
                                <div class="custom-grid-title">LAN</div>
                                <p class="custom-grid-desc">الشبكة المحلية داخل منطقة جغرافية محدودة كالمباني والمكاتب.</p>
                            </div>
                            <div class="custom-grid-card">
                                <i class="fas fa-city custom-grid-icon text-purple-500"></i>
                                <div class="custom-grid-title">MAN</div>
                                <p class="custom-grid-desc">الشبكة المتوسطة الإقليمية التي تربط LANs ضمن مدينة واحدة.</p>
                            </div>

                                <i class="fas fa-globe-africa custom-grid-icon text-orange-500"></i>
                                <div class="custom-grid-title">WAN</div>
                                <p class="custom-grid-desc">الشبكة الواسعة للربط بين مدن ودول وتغطي مسافات شاسعة.</p>
                            </div>
                        </div>

                        <hr class="my-10 border-slate-200">

                        <div class="grid md:grid-cols-2 gap-10">
                            <div>
                                <h2>المعمارية التقنية (Architecture)</h2>
                                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-4 flex items-center gap-4">
                                    <i class="fas fa-users text-4xl text-indigo-500"></i>
                                    <div>
                                        <h3 class="!text-lg !mb-1 text-indigo-800">نظير إلى نظير (P2P)</h3>
                                        <p class="!text-sm text-slate-500 !mb-0 font-bold leading-relaxed">بنية شبكية موزعة تتصل فيها الأجهزة مباشرة دون خادم مركزي، كل جهاز يسمى "نظير" ويعمل كعميل وخادم.</p>
                                    </div>
                                </div>
                                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 flex items-center gap-4">
                                    <i class="fas fa-server text-4xl text-blue-500"></i>
                                    <div>
                                        <h3 class="!text-lg !mb-1 text-blue-800">العميل والخادم (Client/Server)</h3>
                                        <p class="!text-sm text-slate-500 !mb-0 font-bold leading-relaxed">بنية تعتمد على وجود خادم مركزي يقدم خدمات وموارد، وعملاء يطلبون هذه الخدمات وتتم معالجتها بالخادم.</p>
                                    </div>

                            <div>
                                <h2>التصميم الهندسي (Topologies)</h2>
                                <div class="grid grid-cols-2 gap-4 text-center">

                                        <i class="fas fa-grip-lines text-3xl text-emerald-600 mb-2 block"></i>
                                        <span class="font-black text-emerald-900">الخطية (Bus)</span>
                                        <p class="text-[10px] text-slate-500 mt-1 font-bold">كابل رئيسي واحد.</p>

                                    <div class="bg-emerald-50 p-5 rounded-2xl border border-emerald-100">
                                        <i class="fas fa-sync text-3xl text-emerald-600 mb-2 block"></i>

                                        <span class="font-black text-emerald-900">المعقدة (Mesh)</span>

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`
                ]
            },
            'security': {
                title: 'الأمان في الشبكات', icon: 'fa-shield-alt', color: 'red', desc: 'التهديدات الداخلية والخارجية والحلول الأمنية.',
                tabs: ['التهديدات الداخلية والخارجية', 'حلول الأمان في الشبكات'],
                content: [
                    `<div class="rich-display glass-card p-10">
                        <h1><i class="fas fa-shield-alt ml-2 text-red-500"></i> التهديدات الأمنية للشبكة</h1>
                        <div class="grid md:grid-cols-2 gap-8 mt-6">
                            <div class="bg-orange-50 p-8 rounded-3xl border border-orange-200">
                                <h2 class="!text-orange-700 flex items-center gap-2"><i class="fas fa-user-tie"></i> التهديدات الداخلية</h2>
                                <p class="!text-sm">تأتي من داخل المؤسسة نفسها سواء بقصد أو بدون قصد. خطورتها تكمن في أن أصحابها غالباً يمتلكون صلاحيات وصول واسعة.</p>
                                <h3 class="!text-lg !text-orange-800 mt-4">أمثلة:</h3>
                                <ul class="!text-sm !text-orange-900/80">
                                    <li>مشاركة كلمة المرور مع الآخرين.</li>
                                    <li>حذف ملفات وقواعد بيانات مهمة عن طريق الخطأ.</li>
                                    <li>استخدام أجهزة شخصية غير آمنة (USB) داخل الشبكة.</li>
                                    <li>التخريب المتعمد من قبل موظف غاضب.</li>
                                </ul>
                            </div>
                            <div class="bg-red-50 p-8 rounded-3xl border border-red-200">
                                <h2 class="!text-red-700 flex items-center gap-2"><i class="fas fa-user-ninja"></i> التهديدات الخارجية</h2>
                                <p class="!text-sm">تأتي من خارج حدود الشبكة (الإنترنت). قد تؤدي لسرقة بيانات، تعطيل خدمات، أو ابتزاز مالي.</p>
                                <h3 class="!text-lg !text-red-800 mt-4">أمثلة:</h3>
                                <ul class="!text-sm !text-red-900/80">
                                    <li>هجمات الاختراق المباشر (Hacking) واستغلال الثغرات.</li>
                                    <li>البرمجيات الخبيثة (Malware) والفيروسات.</li>
                                    <li>هجمات حجب الخدمة (DDoS) لإسقاط الخوادم.</li>
                                    <li>التصيد الإلكتروني (Phishing) لسرقة الحسابات والهويات.</li>
                                </ul>
                            </div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card p-10">
                        <h1 class="text-center">حلول الأمان والترسانة التقنية</h1>
                        <div class="custom-grid-container">
                            <div class="custom-grid-card border-b-4 border-b-rose-500 bg-slate-50">
                                <div class="bg-rose-100 w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4"><i class="fas fa-fire-alt text-3xl text-rose-600"></i></div>
                                <div class="custom-grid-title text-slate-800">الجدران النارية (Firewalls)</div>
                                <p class="custom-grid-desc">تعمل كحارس صارم بين الشبكة الداخلية والعالم الخارجي، وتسمح فقط بالاتصالات المصرح بها.</p>
                            </div>
                            <div class="custom-grid-card border-b-4 border-b-blue-500 bg-slate-50">
                                <div class="bg-blue-100 w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4"><i class="fas fa-eye text-3xl text-blue-600"></i></div>
                                <div class="custom-grid-title text-slate-800">كشف ومنع التسلل (IDS/IPS)</div>
                                <p class="custom-grid-desc">الـ IDS يكتشف الهجمات وينذر، بينما الـ IPS أذكى حيث يكتشف ويمنع الهجمات ويقطع الاتصال تلقائياً.</p>
                            </div>
                            <div class="custom-grid-card border-b-4 border-b-purple-500 bg-slate-50">
                                <div class="bg-purple-100 w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4"><i class="fas fa-key text-3xl text-purple-600"></i></div>
                                <div class="custom-grid-title text-slate-800">التشفير (Encryption)</div>
                                <p class="custom-grid-desc">تحويل البيانات إلى طلاسم وصيغ غير مفهومة لحمايتها أثناء النقل عبر الشبكة ولا تقرأ إلا بمفتاح فك تشفير.</p>
                            </div>
                            <div class="custom-grid-card border-b-4 border-b-emerald-500 bg-slate-50">
                                <div class="bg-emerald-100 w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4"><i class="fas fa-id-card-clip text-3xl text-emerald-600"></i></div>
                                <div class="custom-grid-title text-slate-800">إدارة الصلاحيات</div>
                                <p class="custom-grid-desc">تحديد هويات المستخدمين ومن يمكنه الوصول إلى المجلدات والأنظمة داخل الشبكة لإيقاف الفضوليين.</p>
                            </div>
                            <div class="custom-grid-card border-b-4 border-b-orange-500 bg-slate-50 md:col-span-1 lg:col-span-1">
                                <div class="bg-orange-100 w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4"><i class="fas fa-hdd text-3xl text-orange-600"></i></div>
                                <div class="custom-grid-title text-slate-800">النسخ الاحتياطي (Backup)</div>
                                <p class="custom-grid-desc">تخزين البيانات في مكان آمن لاسترجاعها عند الفقدان أو التشفير (مثل هجمات برامج الفدية Ransomware).</p>
                            </div>
                            <div class="custom-grid-card border-b-4 border-b-yellow-500 bg-slate-50">
                                <div class="bg-yellow-100 w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4"><i class="fas fa-user-graduate text-3xl text-yellow-600"></i></div>
                                <div class="custom-grid-title text-slate-800">التوعية الأمنية</div>
                                <p class="custom-grid-desc">تدريب المستخدمين البشريين (الحلقة الأضعف) على عدم فتح الروابط المشبوهة واستخدام كلمات مرور قوية.</p>
                            </div>
                        </div>
                    </div>`
                ]
            },
            'osi': {
                title: 'نموذج OSI المرجعي', icon: 'fa-layer-group', color: 'emerald', desc: 'تحليل معماري للطبقات السبع، عمليات التغليف، والمقارنات.',
                tabs: ['مقدمة والطبقات السبع', 'التغليف وأنواع الاتصال', 'مقارنات بروتوكولات وأجهزة'],
                content: [
                    `<div class="rich-display glass-card p-10">
                        <h1>مرجع OSI (Open Systems Interconnection)</h1>
                        <p>هو مراحل تكون البيانات ونقلها من الجهاز المرسل (Source device) إلى الجهاز المستقبل (Destination device). وضعته المنظمة الدولية للمعايير (ISO) سنة 1983 برقم 7498 ليكون نموذج نظري موثوق للاتصالات مقسم لـ 7 طبقات.</p>
                        
                        <h2>فائدة فهم طبقات OSI:</h2>
                        <ul>
                            <li>تستطيع فهم وحل المشاكل (Troubleshooting) للشبكات.</li>
                            <li>معرفة كيفية تكوين البيانات وما هو شكلها في كل مرحلة.</li>
                            <li>تفيد بمعرفة النقاط الحساسة وكيفية تشفير وفك البيانات.</li>
                            <li>معرفة كل جهاز في أية طبقة يعمل (مثل HUB والراوتر والسويتش).</li>
                        </ul>

                        <h2 class="text-center mt-10">الطبقات السبع (OSI Layers)</h2>
                        <div class="space-y-4 font-sans mt-6">
                            <div class="bg-white border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-red-500 hover:bg-slate-50 transition"><span class="text-4xl font-black text-red-300 w-12 text-center">7</span><div><h4 class="text-xl font-black text-slate-800">Application (طبقة التطبيقات)</h4><p class="font-bold text-sm text-slate-600 mt-1">التطبيقات التي نستخدمها لإرسال الرسائل وتعتبر واجهة المستخدم للشبكة. بروتوكولات: HTTP (ويب), FTP (ملفات), SMTP (بريد).</p></div></div>
                            <div class="bg-white border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-orange-500 hover:bg-slate-50 transition"><span class="text-4xl font-black text-orange-300 w-12 text-center">6</span><div><h4 class="text-xl font-black text-slate-800">Presentation (طبقة التقديم)</h4><p class="font-bold text-sm text-slate-600 mt-1">تهيئة البيانات وتحديد امتدادها (نصوص، صور)، وعمل التشفير وفك التشفير والضغط. بروتوكولات: JPEG, HTML.</p></div></div>
                            <div class="bg-white border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-yellow-500 hover:bg-slate-50 transition"><span class="text-4xl font-black text-yellow-400 w-12 text-center">5</span><div><h4 class="text-xl font-black text-slate-800">Session (طبقة الجلسة)</h4><p class="font-bold text-sm text-slate-600 mt-1">إدارة وفتح وإغلاق الاتصال وتحديد نوعه إرسال واستقبال (Simplex, Half Duplex, Full Duplex). بروتوكولات: NFS, SQL.</p></div></div>
                            <div class="bg-white border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-emerald-500 hover:bg-slate-50 transition"><span class="text-4xl font-black text-emerald-400 w-12 text-center">4</span><div><h4 class="text-xl font-black text-slate-800">Transport (طبقة النقل)</h4><p class="font-bold text-sm text-slate-600 mt-1">تحديد البروتوكول المناسب لنقل البيانات وتقطيعها (Segment) وضمانها. بروتوكولات: TCP (للملفات), UDP (للصوت والفيديو).</p></div></div>
                            <div class="bg-white border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-blue-500 hover:bg-slate-50 transition"><span class="text-4xl font-black text-blue-400 w-12 text-center">3</span><div><h4 class="text-xl font-black text-slate-800">Network (طبقة الشبكة)</h4><p class="font-bold text-sm text-slate-600 mt-1">إضافة عنوان IP للمرسل والمستقبل، واختيار مسار التوجيه (Routing). الجهاز: الراوتر. شكل البيانات: Packet.</p></div></div>
                            <div class="bg-white border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-indigo-500 hover:bg-slate-50 transition"><span class="text-4xl font-black text-indigo-400 w-12 text-center">2</span><div><h4 class="text-xl font-black text-slate-800">Data Link (طبقة ربط البيانات)</h4><p class="font-bold text-sm text-slate-600 mt-1">إضافة معلومات التحكم لاكتشاف الأخطاء واستخدام العنوان الفيزيائي (MAC Address). الجهاز: السويتش. شكل البيانات: Frame.</p></div></div>
                            <div class="bg-white border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-purple-500 hover:bg-slate-50 transition"><span class="text-4xl font-black text-purple-400 w-12 text-center">1</span><div><h4 class="text-xl font-black text-slate-800">Physical (الطبقة الفيزيائية)</h4><p class="font-bold text-sm text-slate-600 mt-1">تحويل البيانات إلى إشارات (Bits) كهربائية/ضوئية لتسليمها للكابل عبر كرت الشبكة. الجهاز: Hub, Cables.</p></div></div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card p-10">
                        <div class="bg-emerald-50 p-8 rounded-2xl border border-emerald-100 mb-8">
                            <h2>ما هو البروتوكول Protocol؟</h2>
                            <p class="!text-sm">مجموعة من الأكواد البرمجية والقواعد التي تحدد كيف يمكن لأجهزة الكمبيوتر أن تتفاهم مع بعضها عبر الشبكة التي تتواجد عليها، لتسهيل عملية التخاطب.</p>
                        </div>
                        <div class="bg-blue-50 p-8 rounded-2xl border border-blue-100 mb-10">
                            <h2 class="!text-blue-700">تغليف البيانات (Encapsulation)</h2>
                            <p class="!text-sm mb-2">تسمى العملية التي تضيف فيها البروتوكولات الترويسات (Header) والتذييل (Trailer) على البيانات بعملية تغليف البيانات، وهذا ما يحدث في عملية الإرسال نزولاً للطبقة الأولى.</p>
                            <p class="!text-sm font-black text-blue-900">في عملية الاستقبال تسمى عملية فك التغليف (De-Encapsulation) وتحدث صعوداً للطبقة السابعة.</p>
                        </div>
                        
                        <h2 class="text-center border-b-2 border-slate-100 pb-4">أنواع الاتصالات في طبقة الجلسة</h2>
                        <div class="grid md:grid-cols-3 gap-6 text-center mt-6">
                            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover-scale"><i class="fas fa-arrow-right text-4xl text-rose-500 mb-4 block"></i><h4 class="font-black text-xl mb-2 text-slate-800">Simplex</h4><p class="text-xs font-bold text-slate-500">إرسال في اتجاه واحد فقط يرسل مرة واحدة مثل الراديو والتلفزيون.</p></div>
                            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover-scale"><i class="fas fa-exchange-alt text-4xl text-yellow-500 mb-4 block"></i><h4 class="font-black text-xl mb-2 text-slate-800">Half Duplex</h4><p class="text-xs font-bold text-slate-500">إرسال واستقبال ولكن ليس في نفس الوقت مثل أجهزة الشرطة (اللاسلكي).</p></div>
                            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover-scale"><i class="fas fa-arrows-alt-h text-4xl text-emerald-500 mb-4 block"></i><h4 class="font-black text-xl mb-2 text-slate-800">Full Duplex</h4><p class="text-xs font-bold text-slate-500">استقبال وإرسال بخط واحد في نفس الوقت مثل الاتصال بالجوال.</p></div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card p-10">
                        <h1 class="text-center mb-8">مقارنات هامة في الشبكات</h1>
                        
                        <h2>الفروق بين TCP و UDP (في طبقة النقل)</h2>
                        <table>
                            <thead>
                                <tr>
                                    <th>وجه المقارنة</th>
                                    <th>بروتوكول TCP</th>
                                    <th style="color: #ea580c;">بروتوكول UDP</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td>حجم الـ Header</td><td>20 bytes</td><td>8 bytes</td></tr>
                                <tr><td>السرعة</td><td>أبطأ</td><td>أسرع</td></tr>
                                <tr><td>التحقق من الأخطاء وترتيب الأجزاء</td><td style="color: #059669;">نعم</td><td style="color: #ef4444;">لا</td></tr>
                                <tr><td>الاستخدام الشائع</td><td>تحميل الملفات، التصفح، الإيميل</td><td>البث المرئي، ألعاب الأونلاين المباشرة</td></tr>
                            </tbody>
                        </table>

                        <h2 class="mt-12">الراوتر (ROUTER) VS السويتش (SWITCH)</h2>
                        <table>
                            <thead>
                                <tr>
                                    <th>وجه المقارنة</th>
                                    <th style="color: #4338ca;"><i class="fas fa-random"></i> السويتش (SWITCH)</th>
                                    <th style="color: #059669;"><i class="fas fa-route"></i> الراوتر (ROUTER)</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td>الطبقة التي يعمل بها</td><td>الطبقة الثانية (Data Link Layer)</td><td>الطبقة الثالثة (Network Layer)</td></tr>
                                <tr><td>اسم الرسالة</td><td>الإطار (Frame)</td><td>الحزمة (Packet)</td></tr>
                                <tr><td>نطاق الاستخدام</td><td>الشبكات المحلية (LAN)</td><td>الشبكات الواسعة (WAN)</td></tr>
                                <tr><td>المنافذ</td><td>منافذ إيثرنت 24 أو 48، لا يوجد سيريال</td><td>منافذ إيثرنت تصل لـ 4، ومنافذ سيريال للـ WAN</td></tr>
                                <tr><td>الاعتماد الأساسي</td><td>جدول العناوين الفيزيائية (MAC Address)</td><td>بروتوكول العنونة (IP Address)</td></tr>
                            </tbody>
                        </table>
                    </div>`
                ]
            },
            'cables': {
                title: 'كيابل شبكات الحاسب', icon: 'fa-ethernet', color: 'purple', desc: 'وسائط النقل، الأنواع، معايير التأريج وأدوات الفني.',
                tabs: ['أنواع الكابلات وفئاتها', 'الترتيب والأدوات', 'الألياف الضوئية (Fiber)'],
                content: [
                    `<div class="rich-display glass-card p-10">
                        <h1>ما هو الكابل؟</h1>
                        <p>الكابل هو الوسيط الذي تنتقل من خلاله البيانات والمعلومات من حاسب إلى آخر في الشبكة أو من شبكة إلى شبكة أخرى.</p>
                        
                        <h2 class="text-center mt-10">أنواع كبلات الشبكات الأساسية</h2>
                        <div class="custom-grid-container">
                            <div class="custom-grid-card border-t-4 border-t-slate-400">
                                <i class="fas fa-dot-circle custom-grid-icon text-slate-400"></i>
                                <div class="custom-grid-title text-slate-800">المحوري (Coaxial)</div>
                                <p class="custom-grid-desc">يتكون من موصل نحاسي مركزي وعازل بلاستيكي ووقاء نحاسي مجدول. يستخدم غالباً لتوصيل أنظمة التلفاز وموصلات BNC و F و N للكاميرات القديمة.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-purple-500">
                                <i class="fas fa-bezier-curve custom-grid-icon text-purple-600"></i>
                                <div class="custom-grid-title text-purple-800">المزدوج المجدول (Twisted Pair)</div>
                                <p class="custom-grid-desc">يتكون من 8 أزواج ملفوفة لتقليل التشويش. ينقسم لمحمي (STP) بقصدير، وغير محمي (UTP). وهو المعيار الأشهر للشبكات المحلية.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-blue-500">
                                <i class="fas fa-bolt custom-grid-icon text-blue-600"></i>
                                <div class="custom-grid-title text-blue-800">الضوئي (Fiber Optic)</div>
                                <p class="custom-grid-desc">ينقل البيانات على شكل نبضات ضوء داخل زجاج، يوفر سرعات هائلة ومسافات بعيدة بدون تأثر بالتشويش الكهرومغناطيسي.</p>
                            </div>
                        </div>

                        <h2 class="mt-10">فئات كابل المزدوج المجدول (UTP Categories)</h2>
                        <table>
                            <thead>
                                <tr><th>الفئة (Category)</th><th>سرعة نقل البيانات</th><th>الاستخدام الشهير</th></tr>
                            </thead>
                            <tbody>
                                <tr><td style="color: #9333ea; font-weight: 900;">CAT1</td><td>Up to 1Mbps</td><td>شبكات الهاتف القديمة</td></tr>
                                <tr><td style="color: #9333ea; font-weight: 900;">CAT3</td><td>Up to 10Mbps</td><td>10BASE-T Ethernet</td></tr>
                                <tr><td style="color: #9333ea; font-weight: 900;">CAT5e</td><td>Up to 1 Gbps</td><td>Gigabit Ethernet</td></tr>
                                <tr><td style="color: #9333ea; font-weight: 900;">CAT6</td><td>Up to 10Gbps</td><td>10G Ethernet (لمسافة 55م)</td></tr>
                                <tr><td style="color: #9333ea; font-weight: 900;">CAT7</td><td>Up to 10Gbps</td><td>10G Ethernet (لمسافة 100م)</td></tr>
                            </tbody>
                        </table>
                    </div>`,
                    `<div class="rich-display glass-card p-10">
                        <h1 class="text-center">أنواع التوصيل في الكابل (T568A / T568B)</h1>
                        <p class="text-center mb-8">هناك نظامان مختلفان لترتيب أسلاك المزدوجة المجدولة (8 ألوان) داخل المشبك البلاستيكي RJ-45.</p>
                        
                        <div class="grid md:grid-cols-2 gap-8 mb-12">
                            <div class="bg-blue-50 p-8 rounded-3xl border border-blue-100">
                                <h2 class="!text-blue-800">التوصيل المتناظر (Straight-through)</h2>
                                <p class="!text-sm mb-4">يستخدم نفس ترتيب الألوان تماماً في الطرفين.</p>
                                <h3 class="!text-base !text-blue-900">لربط أجهزة (مختلفة) في طبيعة عملها:</h3>
                                <ul class="!text-sm"><li>كمبيوتر مع سويتش</li><li>راوتر مع سويتش</li></ul>
                            </div>
                            <div class="bg-orange-50 p-8 rounded-3xl border border-orange-100">
                                <h2 class="!text-orange-800">التوصيل العكسي (Crossover)</h2>

        function loadTabContent(index) {
            const area = document.getElementById('content-area');
            const s = CORE_DATA[activeSection];
            
            document.querySelectorAll('[id^="mtab-"]').forEach(t => { t.classList.remove('border-blue-600', 'text-blue-700'); t.classList.add('border-transparent', 'text-slate-500'); });

            const activeSTab = document.getElementById(`stab-${index}`); if(activeSTab) activeSTab.classList.add('active');

            area.classList.remove('page-enter');
            void area.offsetWidth;
            area.classList.add('page-enter');

            if (index < s.content.length) {
                area.innerHTML = s.content[index];
            } else {
                const cloudIdx = index - s.content.length;
                let cloudArticlesForThisSection = [];
                Object.values(window.allArticlesMap).forEach(a => { if(a.sectionId === activeSection) cloudArticlesForThisSection.push(a); });

        window.resetCMSForm = () => {
            document.getElementById('edit-doc-id').value = '';
            document.getElementById('cms-editor-title').innerText = 'إضافة درس/مقال جديد';
            document.getElementById('cms-section').value = 'new';
            document.getElementById('cms-order').value = '1';
            document.getElementById('cms-tab-name').value = '';
            document.getElementById('cms-content').innerHTML = 'اكتب المحتوى هنا... لتعديل العناوين ظلل النص واختر لونه وحجمه';
        };

        window.saveArticle = async () => {
            const docId = document.getElementById('edit-doc-id').value;
            const sectionId = document.getElementById('cms-section').value;
            const order = parseInt(document.getElementById('cms-order').value) || 1;
            const tabName = document.getElementById('cms-tab-name').value.trim();
            const htmlContent = document.getElementById('cms-content').innerHTML;

            if(!tabName || !htmlContent || htmlContent.trim() === '') return toast("أدخل العنوان والمحتوى", "error");

            const payload = { sectionId, tabName, htmlContent, order, timestamp: new Date().toISOString() };

            try {
                if(docId) { await updateDoc(doc(db, PATH, 'articles', docId), payload); toast("تم تعديل الدرس بنجاح!"); } 
                else { await addDoc(collection(db, PATH, 'articles'), payload); toast("تم نشر الدرس بنجاح!"); }
                resetCMSForm(); loadCmsList(); fetchCloudArticles(); 
            } catch(e) { toast("خطأ في الحفظ", "error"); }
        };

        window.loadCmsList = async () => {
            const list = document.getElementById('cms-list'); list.innerHTML = '<p class="text-sm text-slate-500 font-bold">جاري التحميل...</p>';
            try {
                const s = await getDocs(collection(db, PATH, 'articles')); let arr = [];
                s.forEach(d => arr.push({id: d.id, ...d.data()}));
                arr.sort((a,b) => (a.order || 0) - (b.order || 0));
                
                if(!arr.length) return list.innerHTML = '<p class="text-sm text-slate-400 font-bold">لا يوجد محتوى مضاف.</p>';
                list.innerHTML = arr.map(a => `
                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 flex justify-between items-center transition hover:bg-slate-100">
                        <div>
                            <p class="font-bold text-blue-700 text-sm">${a.tabName}</p>
                            <p class="text-[10px] text-slate-500 font-bold">المكان: ${a.sectionId === 'new' ? 'مستقل' : a.sectionId} | الترتيب: ${a.order}</p>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="editArticleId('${a.id}')" class="w-7 h-7 bg-blue-100 text-blue-600 rounded hover:bg-blue-200 transition"><i class="fas fa-edit text-xs"></i></button>
                            <button onclick="delArticle('${a.id}')" class="w-7 h-7 bg-red-100 text-red-600 rounded hover:bg-red-200 transition"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                    </div>
                `).join('');
            } catch(e) { list.innerHTML = '<p class="text-red-500 text-sm">خطأ</p>'; }
        };

        window.editArticleId = (id) => {
            const obj = window.allArticlesMap[id];
            if(!obj) return toast("خطأ في جلب الدرس", "error");
            document.getElementById('edit-doc-id').value = obj.id;
            document.getElementById('cms-editor-title').innerText = 'تعديل الدرس: ' + obj.tabName;
            document.getElementById('cms-section').value = obj.sectionId || 'new';
            document.getElementById('cms-order').value = obj.order || 1;
            document.getElementById('cms-tab-name').value = obj.tabName;
            document.getElementById('cms-content').innerHTML = obj.htmlContent;
            document.getElementById('main-scroll-area').scrollTo({top:0, behavior:'smooth'});
        };

        window.delArticle = async (id) => {
            if(!confirm("هل أنت متأكد من الحذف؟")) return;
            try { await deleteDoc(doc(db, PATH, 'articles', id)); toast("تم الحذف"); loadCmsList(); fetchCloudArticles(); } catch(e) { toast("خطأ", "error"); }
        };

        window.loadDynamicArticles = async () => {
            const list = document.getElementById('dynamic-articles-list');
            try {
                const s = await getDocs(collection(db, PATH, 'articles')); let arr = [];
                s.forEach(d => { if(d.data().sectionId === 'new') arr.push(d.data()); });
                arr.sort((a,b) => (a.order||0) - (b.order||0));
                
                if(!arr.length) return list.innerHTML = '<div class="col-span-full text-center py-10 text-slate-400 font-bold text-sm bg-white rounded-2xl border border-slate-200 shadow-sm">لا توجد دروس مضافة حالياً.</div>';
                
                list.innerHTML = arr.map(a => `
                    <div class="glass-card border-t-[6px] border-cyan-500">
                        <h3 class="text-2xl font-black text-cyan-700 m-8 mb-0 border-b border-slate-100 pb-3">${a.tabName}</h3>
                        <div class="rich-display bg-transparent border-none min-h-0 h-auto">${a.htmlContent}</div>
                    </div>
                `).join('');
            } catch(e) { list.innerHTML = '<div class="col-span-full text-red-500 font-bold text-center">خطأ في الجلب.</div>'; }
        };

        // -------- وظائف LMS (بمحرر نصوص غني) --------
        let qCount = 0;
        window.addQForm = () => {
            qCount++;
            const editorId = 'q-editor-' + qCount;
            const d = document.createElement('div'); d.className = 'p-5 bg-white border border-slate-200 rounded-2xl q-form-block relative shadow-sm mb-4';
            d.innerHTML = `
                <select class="q-ty w-full p-2 bg-slate-50 border border-slate-200 rounded-lg mb-3 font-bold text-slate-700 outline-none text-sm" onchange="window.updTy(this)">
                    <option value="multiple-choice">اختيار من متعدد (إجابة واحدة)</option>
                    <option value="multiple-answers">إجابات متعددة (Checkboxes)</option>
                    <option value="true-false">صح أم خطأ</option>
                    <option value="short-answer">إجابة قصيرة (نصية)</option>
                </select>
                
                <!-- محرر نصوص للسؤال -->
                <div class="editor-toolbar bg-slate-50 p-1.5 rounded-t-lg flex flex-wrap gap-1 border border-slate-200 border-b-0 text-xs items-center">
                    <button onclick="execCmd('${editorId}', 'bold')" title="عريض"><i class="fas fa-bold"></i></button>
                    <button onclick="execCmd('${editorId}', 'italic')" title="مائل"><i class="fas fa-italic"></i></button>
                    <button onclick="execCmd('${editorId}', 'underline')" title="تسطير"><i class="fas fa-underline"></i></button>
                    <div class="w-px h-4 bg-slate-300 mx-1"></div>
                    <select onchange="execCmd('${editorId}', 'fontSize', this.value)" class="text-[10px] p-1 font-bold text-slate-600" title="حجم الخط">
                        <option value="3">حجم عادي</option><option value="5">حجم كبير</option><option value="6">أكبر</option>
                    </select>
                    <div class="flex items-center gap-1 bg-white border border-slate-200 rounded px-1">
                        <span class="text-[9px] font-bold text-slate-500">لون:</span>
                        <input type="color" onchange="execCmd('${editorId}', 'foreColor', this.value)" class="w-5 h-5 p-0 border-none bg-transparent cursor-pointer">
                    </div>
                    <div class="w-px h-4 bg-slate-300 mx-1"></div>
                    <button onclick="insertImagePrompt('${editorId}')" title="صورة برابط" class="text-blue-600"><i class="fas fa-link"></i> <i class="fas fa-image"></i></button>
                    <button onclick="document.getElementById('img-upload-q-${qCount}').click()" title="رفع صورة" class="text-emerald-600"><i class="fas fa-upload"></i> <i class="fas fa-image"></i></button>
                    <input type="file" id="img-upload-q-${qCount}" accept="image/*" class="hidden" onchange="handleImageUpload(event, '${editorId}')">
                </div>
                <div id="${editorId}" contenteditable="true" class="q-t w-full p-4 bg-white border border-slate-200 rounded-b-lg mb-4 text-slate-800 font-bold text-base outline-none overflow-y-auto min-h-[80px]" placeholder="اكتب السؤال هنا.. ظلل النص لتغيير اللون أو الحجم"></div>
                
                <div class="q-opts grid grid-cols-2 gap-2 mb-3">
                    <input class="o1 p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-blue-500" placeholder="الخيار 1">
                    <input class="o2 p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-blue-500" placeholder="الخيار 2">
                    <input class="o3 p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-blue-500" placeholder="الخيار 3">
                    <input class="o4 p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold text-slate-700 outline-none focus:border-blue-500" placeholder="الخيار 4">
                </div>
                <input type="text" class="q-c w-full p-2 bg-emerald-50 border border-emerald-200 rounded-lg text-center text-emerald-700 font-bold text-sm outline-none placeholder:text-emerald-400" placeholder="رقم الإجابة الصحيحة (1-4)">
                <button onclick="this.parentElement.remove()" class="absolute top-3 left-3 text-red-500 hover:text-red-700 bg-red-50 p-1.5 rounded"><i class="fas fa-trash text-xs"></i></button>`;
            document.getElementById('quiz-c').appendChild(d);
        };

        window.updTy = s => {
            const b = s.closest('.q-form-block'), t = s.value, oc = b.querySelector('.q-opts'), c = b.querySelector('.q-c');
            if(t==='short-answer'){ oc.style.display='none'; c.placeholder="اكتب النص الصحيح"; }
            else if(t==='true-false'){ oc.style.display='grid'; b.querySelector('.o1').value="صح"; b.querySelector('.o2').value="خطأ"; b.querySelector('.o3').style.display=b.querySelector('.o4').style.display='none'; c.placeholder="1 لصح، 2 لخطأ"; }
            else { oc.style.display='grid'; b.querySelector('.o3').style.display=b.querySelector('.o4').style.display='block'; c.placeholder=t==='multiple-answers'?"1,3":"رقم الإجابة"; }
        };

        window.saveQuiz = async () => {
            const title = document.getElementById('quiz-t').value.trim(); if(!title) return toast("أدخل عنوان الاختبار", "error");
            let qs = [], ok = true; document.querySelectorAll('.q-form-block').forEach(b => { 
                const ty = b.querySelector('.q-ty').value, tx = b.querySelector('.q-t').innerHTML.trim(), crRaw = b.querySelector('.q-c').value.trim();
                if(!tx || !crRaw) { ok = false; return; }
                let opts = [], cr = crRaw;
                if(ty !== 'short-answer') { opts = [b.querySelector('.o1').value, b.querySelector('.o2').value, b.querySelector('.o3').value, b.querySelector('.o4').value].filter(x=>x); if(ty==='true-false') opts.length=2; }
                if(ty === 'multiple-answers') cr = crRaw.split(',').map(n=>parseInt(n.trim())-1); else if(ty!=='short-answer') cr = parseInt(crRaw)-1;
                qs.push({ type: ty, text: tx, options: opts, correctAnswer: cr }); 
            });
            if(!qs.length || !ok) return toast("تأكد من تعبئة جميع الحقول", "error");
            try { await addDoc(collection(db, PATH, 'quizzes'), { title, questions: qs, createdAt: new Date().toISOString() }); toast("تم الحفظ سحابياً بنجاح"); renderDash(); } catch(e){toast("خطأ","error");}
        };

        window.renderStudentPortal = async () => {
            document.getElementById('lms-area').innerHTML = `
            <div class="max-w-4xl mx-auto"><div class="glass-card p-6 flex items-center gap-4 mb-10"><div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-xl"><i class="fas fa-user-edit"></i></div><input type="text" id="student-n" class="w-full bg-transparent border-none text-xl font-black text-slate-800 focus:outline-none placeholder:text-slate-400" placeholder="أدخل اسمك الثلاثي للبدء.."></div><h3 class="text-2xl font-black mb-6 text-slate-800 border-b border-slate-200 pb-3">الاختبارات المتاحة:</h3><div id="quizzes-grid" class="grid md:grid-cols-2 gap-6 text-center text-slate-500 font-bold"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><br>جاري جلب الاختبارات..</div></div>`;
            try {
                const s = await getDocs(collection(db, PATH, 'quizzes')); quizzesCache = []; s.forEach(d => quizzesCache.push({id:d.id, ...d.data()}));
                const qg = document.getElementById('quizzes-grid');
                if(!quizzesCache.length) qg.innerHTML = '<p class="col-span-full bg-white p-6 rounded-2xl border border-slate-200 text-sm">لا توجد اختبارات متاحة.</p>';
                else qg.innerHTML = quizzesCache.map(q => `<div onclick="startQuiz('${q.id}')" class="glass-card p-8 border-r-[8px] border-blue-500 cursor-pointer hover-scale text-right"><h4 class="font-black text-xl mb-3 text-blue-700">${q.title}</h4><p class="text-xs font-bold text-slate-500 bg-slate-50 inline-block p-1.5 rounded border border-slate-200"><i class="fas fa-list-check text-blue-500"></i> ${q.questions.length} أسئلة تقييمية</p></div>`).join('');
            } catch(e) { document.getElementById('quizzes-grid').innerHTML = '<p class="col-span-full text-red-500 text-sm">خطأ في جلب الاختبارات.</p>'; }
        };

        window.startQuiz = id => {
            const n = document.getElementById('student-n').value.trim(); if(!n) return toast("يرجى كتابة الاسم أولاً", "error");
            const q = quizzesCache.find(x => x.id === id); activeQuiz = q;
            document.getElementById('lms-area').innerHTML = `<div class="glass-card max-w-4xl mx-auto p-10 border-t-[10px] border-blue-600"><div class="flex justify-between items-center mb-8 border-b border-slate-100 pb-4"><h2 class="text-2xl font-black text-slate-800">${q.title}</h2><button onclick="renderStudentPortal()" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition"><i class="fas fa-times"></i></button></div><div id="q-render-area" class="space-y-10"></div><button onclick="processSubmit()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black text-xl shadow-lg mt-10 transition">تسليم الاختبار <i class="fas fa-paper-plane ml-2"></i></button></div>`;
            
            document.getElementById('q-render-area').innerHTML = q.questions.map((qu, i) => {
                let optsHtml = '';
                if(qu.type === 'short-answer') optsHtml = `<input type="text" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 font-bold focus:border-blue-500 outline-none tin text-sm shadow-inner" placeholder="اكتب إجابتك هنا..">`;
                else if(qu.type === 'multiple-answers') optsHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-3">${qu.options.map((o, j) => `<label class="p-4 border border-slate-200 bg-slate-50 rounded-xl flex items-center gap-3 cursor-pointer hover:bg-blue-50 transition"><input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-blue-600" value="${j}"> <span class="font-bold text-sm text-slate-700">${o}</span></label>`).join('')}</div>`;
                else optsHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-3">${qu.options.map((o, j) => `<div onclick="selectOpt(this)" class="p-4 border border-slate-200 bg-slate-50 rounded-xl cursor-pointer opt-box hover:border-blue-300 hover:bg-blue-50 font-bold text-sm text-slate-700 transition" data-v="${j}">${o}</div>`).join('')}</div>`;
                
                return `<div class="p-8 bg-white border border-slate-200 rounded-3xl q-entry shadow-sm" data-i="${i}" data-ty="${qu.type}" data-cr="${typeof qu.correctAnswer==='object'?qu.correctAnswer.join(','):qu.correctAnswer}">
                    <div class="text-lg font-black mb-6 leading-relaxed text-blue-900 rich-display p-0 border-none bg-transparent min-h-0 h-auto inline">${i+1}. ${qu.text}</div> ${qu.type==='multiple-answers'?'<span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded ml-2 font-black align-top">(متعدد)</span>':''}
                    <div class="mt-4">${optsHtml}</div>
                </div>`;
            }).join('');
        };

        window.selectOpt = el => { el.parentElement.querySelectorAll('.opt-box').forEach(x => x.classList.remove('bg-blue-600', 'border-blue-600', 'text-white', 'active-opt')); el.classList.add('bg-blue-600', 'border-blue-600', 'text-white', 'active-opt'); el.classList.remove('text-slate-700'); };

        window.processSubmit = async () => {
            let score = 0, allAnswered = true;
            document.querySelectorAll('.q-entry').forEach(e => { 
                const ty = e.dataset.ty, cr = e.dataset.cr;
                if(ty === 'short-answer') { const v = e.querySelector('.tin').value.trim(); if(!v) allAnswered=false; else if(v.toLowerCase()===cr.toLowerCase()) score++; }
                else if(ty === 'multiple-answers') { const chks = Array.from(e.querySelectorAll('input:checked')).map(c=>c.value), cra = cr.split(','); if(!chks.length) allAnswered=false; else if(chks.length===cra.length && chks.every(v=>cra.includes(v))) score++; }
                else { const s = e.querySelector('.active-opt'); if(!s) allAnswered=false; else if(s.dataset.v===cr) score++; }
            });
            if(!allAnswered) return toast("الرجاء الإجابة على كافة الأسئلة", "error");

            try {
                await addDoc(collection(db, PATH, 'results'), { studentName: document.getElementById('student-n').value, quizTitle: activeQuiz.title, score, total: activeQuiz.questions.length, timestamp: new Date().toISOString() });
                document.getElementById('lms-area').innerHTML = `
                <div class="glass-card max-w-md mx-auto text-center p-12 border-t-[12px] ${score===activeQuiz.questions.length?'border-yellow-500':'border-emerald-500'}">
                    <i class="fas ${score===activeQuiz.questions.length?'fa-trophy text-yellow-500':'fa-star text-emerald-500'} text-7xl mb-6"></i>
                    <h2 class="text-3xl font-black mb-4 text-slate-800">النتيجة النهائية</h2>
                    <p class="font-bold text-slate-500 text-sm mb-6">أحسنت يا ${document.getElementById('student-n').value}</p>
                    <div class="text-7xl font-black text-blue-600 mb-8 bg-blue-50 py-4 rounded-3xl border border-blue-100">${score}<span class="text-3xl text-slate-400 mx-2">/</span><span class="text-4xl text-slate-500">${activeQuiz.questions.length}</span></div>
                    <button onclick="renderStudentPortal()" class="bg-slate-800 text-white w-full py-4 rounded-xl font-black text-lg transition hover:bg-slate-700">العودة لقائمة الاختبارات</button>
                </div>`;
            } catch(e) { toast("حدث خطأ أثناء حفظ النتيجة", "error"); }
        };

        window.loadRes = async () => {
            const list = document.getElementById('res-list'); list.innerHTML = '<p class="text-center font-bold text-slate-400 text-sm">جاري التحديث..</p>';
            try {
                const s = await getDocs(collection(db, PATH, 'results')); let results = []; s.forEach(d => results.push(d.data()));
                results.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                if(!results.length) return list.innerHTML = '<p class="text-center text-slate-400 font-bold text-sm bg-slate-50 p-4 rounded-xl border border-slate-200">لا توجد نتائج مسجلة.</p>';
                list.innerHTML = `<table class="w-full text-right"><tr class="border-b border-slate-200 text-xs font-black text-slate-500"><th class="pb-3">الاسم</th><th class="pb-3">الاختبار</th><th class="pb-3">الدرجة</th></tr>` + 
                    results.map(r => `<tr class="border-b border-slate-100 hover:bg-slate-50 transition"><td class="py-3 font-black text-sm text-slate-800">${r.studentName}</td><td class="py-3 text-slate-500 font-bold text-xs">${r.quizTitle}</td><td class="py-3 font-mono text-blue-600 text-sm font-black"><span class="bg-blue-50 px-2 py-1 rounded border border-blue-100">${r.score}/${r.total}</span></td></tr>`).join('') + `</table>`;
            } catch(e) { list.innerHTML = '<p class="text-red-500 font-bold text-center text-sm">خطأ في الجلب.</p>'; }
        };

        window.impJ = e => { const r = new FileReader(); r.onload = ev => { try { JSON.parse(ev.target.result).forEach(q => { window.addQForm(); const l = document.getElementById('quiz-c').lastChild; l.querySelector('.q-ty').value=q.type||'multiple-choice'; window.updTy(l.querySelector('.q-ty')); l.querySelector('.q-t').innerHTML = q.text; if(q.options) { l.querySelector('.o1').value = q.options[0]||''; l.querySelector('.o2').value = q.options[1]||''; l.querySelector('.o3').value = q.options[2]||''; l.querySelector('.o4').value = q.options[3]||''; } let cc = q.correctAnswer; if(typeof cc==='object') cc=cc.map(n=>n+1).join(','); else if(q.type!=='short-answer') cc++; l.querySelector('.q-c').value = cc; }); toast("تم الاستيراد بنجاح"); } catch(e){toast("خطأ في ملف JSON","error");} }; r.readAsText(e.target.files[0]); };
    </script>
</body>
</html>
